services:
    spektrum:
        container_name: spektrum-webserver
        build:
            dockerfile: Dockerfile
        env_file: ".env.local"
        volumes:
            - ./:/var/www/spektrum
        ports:
            - "9001:80"
        expose:
            - "9001"

###> symfony/mercure-bundle ###
    mercure:
        image: dunglas/mercure
        restart: unless-stopped
        container_name: spektrum-mercure
        ports:
            - "3000:80"
        volumes:
            - ./docker/mercure/Caddyfile:/etc/caddy/Caddyfile:ro
        environment:
          # Uncomment the following line to disable HTTPS,
          SERVER_NAME: ':80'
          MERCURE_PUBLISHER_JWT_KEY: '9bqJBJrVqvuqkVHkbLaIdCwH9vxGsmVC'
          MERCURE_SUBSCRIBER_JWT_KEY: '9bqJBJrVqvuqkVHkbLaIdCwH9vxGsmVC'
